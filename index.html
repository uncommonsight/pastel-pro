<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pastel You" />
  <meta name="permissions-policy" content="geolocation=()">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <title>Pastel You</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/sliders.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/crop.css">
  <link rel="stylesheet" href="css/presets.css">
  <link rel="stylesheet" href="css/folders.css">

</head>

<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="home-content">
      <div class="home-logo">
        <div class="logo-mark"></div>
        <h1 class="app-title">Pastel You</h1>
        <p class="app-subtitle">make it yours!</p>
        <!-- <p class="app-subtitle">photo editing just for you.</p> -->
      </div>
      <button id="btn-pick" class="btn-primary">
        Edit an Image
      </button>
    </div>
  </div>

  <!-- EDITOR SCREEN -->
  <div id="screen-editor" class="screen">

    <header class="editor-header">
      <div class="header-left">
        <button id="btn-close" class="btn-header">✕</button>
        <button id="btn-back-folder" class="btn-header">←</button>
      </div>
      <div class="header-center">
        <span class="editor-title">Pastel You</span>
        <span class="preset-name-display" id="preset-name-display"></span>
      </div>
      <div class="header-right">
        <div class="btn-undo-wrap">
          <button id="btn-undo" class="btn-header">↺</button>
          <span class="btn-undo-label" id="btn-undo-label"></span>
        </div>
        <button id="btn-download" class="btn-header">Save</button>
      </div>
    </header>

    <div class="canvas-container">
      <canvas id="main-canvas"></canvas>
      <button id="btn-gradient-rotate" class="btn-gradient-rotate">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2.5 7A4.5 4.5 0 1 0 4.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2.5 0.5v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="controls">
      <!-- Crop + Edit icons -->
      <div class="edit-icon-wrap" id="edit-icon-wrap">
        <button id="btn-crop" class="btn-edit-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 1v13h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            <path d="M1 4h13v13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
        <button id="btn-edit" class="btn-edit-icon">
          <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
            <circle cx="5" cy="2" r="1.5" fill="currentColor" />
            <line x1="0" y1="2" x2="20" y2="2" stroke="currentColor" stroke-width="1.5" />
            <circle cx="13" cy="7" r="1.5" fill="currentColor" />
            <line x1="0" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="1.5" />
            <circle cx="7" cy="12" r="1.5" fill="currentColor" />
            <line x1="0" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
      </div>

      <!-- Crop Bubble -->
      <div class="editor-bubble" id="crop-bubble">
        <div class="editor-panel-scroll">
          <div class="editor-section">
            <div class="crop-lock-row">
              <button id="btn-crop-lock" class="crop-lock-btn">
                <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
                  <rect x="2" y="7" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5" />
                  <path d="M4 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
              </button>
              <span class="editor-section-label">Straighten</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Straighten</span>
              <input type="range" class="editor-slider" id="crop-straighten" min="-45" max="45" value="0" step="0.5" />
              <span class="editor-row-value" id="crop-straighten-val">0°</span>
            </div>
            <div class="crop-auto-row">
              <button id="btn-auto-straighten" class="crop-auto-btn">Auto</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Editor Panel -->
      <div class="editor-bubble" id="editor-bubble">
        <div class="editor-panel-scroll">

          <!-- White Balance -->
          <div class="editor-section">
            <span class="editor-section-label">White Balance</span>
            <div class="editor-row">
              <span class="editor-row-label">Warmth</span>
              <input type="range" class="editor-slider" id="edit-warmth" min="-30" max="30" value="0" step="1" />
              <span class="editor-row-value" id="edit-warmth-val">0</span>
            </div>
          </div>

          <!-- Light -->
          <div class="editor-section">
            <span class="editor-section-label">Light</span>
            <div class="editor-row">
              <span class="editor-row-label">Exposure</span>
              <input type="range" class="editor-slider" id="edit-exposure" min="-0.5" max="0.5" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-exposure-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Highlights</span>
              <input type="range" class="editor-slider" id="edit-highlights" min="-0.5" max="0.5" value="0.01"
                step="0.01" />
              <span class="editor-row-value" id="edit-highlights-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Shadows</span>
              <input type="range" class="editor-slider" id="edit-shadows" min="-0.5" max="0.5" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-shadows-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Whites</span>
              <input type="range" class="editor-slider" id="edit-whites" min="-0.5" max="0.5" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-whites-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Blacks</span>
              <input type="range" class="editor-slider" id="edit-blacks" min="-0.5" max="0.5" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-blacks-val">0</span>
            </div>
          </div>

          <!-- Detail -->
          <div class="editor-section">
            <span class="editor-section-label">Detail</span>
            <div class="editor-row">
              <span class="editor-row-label">Contrast</span>
              <input type="range" class="editor-slider" id="edit-contrast" min="-0.5" max="0.5" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-contrast-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Fade</span>
              <input type="range" class="editor-slider" id="edit-fade" min="-20" max="20" value="0" step="0.5" />
              <span class="editor-row-value" id="edit-fade-val">0</span>
            </div>
            <div class="editor-row">
              <span class="editor-row-label">Saturation</span>
              <input type="range" class="editor-slider" id="edit-saturation" min="-0.8" max="0.8" value="0"
                step="0.01" />
              <span class="editor-row-value" id="edit-saturation-val">0</span>
            </div>
          </div>

          <!-- Color -->
          <div class="editor-section">
            <span class="editor-section-label">Color</span>
            <div class="color-chips">
              <button class="color-chip" data-color="red" style="background:#e57373;">R</button>
              <button class="color-chip" data-color="orange" style="background:#ffb74d;">O</button>
              <button class="color-chip" data-color="yellow" style="background:#fff176;">Y</button>
              <button class="color-chip" data-color="green" style="background:#81c784;">G</button>
              <button class="color-chip" data-color="cyan" style="background:#4dd0e1;">C</button>
              <button class="color-chip" data-color="blue" style="background:#64b5f6;">B</button>
              <button class="color-chip" data-color="purple" style="background:#ba68c8;">P</button>
            </div>
            <div class="color-sat-row" id="color-sat-row" style="display:none;">
              <span class="editor-row-label" id="color-sat-label">Red Sat</span>
              <input type="range" class="editor-slider" id="edit-color-sat" min="-1" max="1" value="0" step="0.01" />
              <span class="editor-row-value" id="edit-color-sat-val">0</span>
            </div>
          </div>

        </div>
      </div>

      <div class="intensity-wrap">
        <span class="intensity-label">Strength</span>
        <input type="range" id="intensity-slider" min="0" max="100" value="100" />
        <span class="intensity-value" id="intensity-display">100</span>
      </div>

      <div class="preset-bubble">
        <div class="presets-scroll">
          <div class="presets-track" id="presets-track"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="image/*" style="display:none" />

  <!-- Hidden download anchor -->
  <a id="download-anchor" style="display:none"></a>

  <script src="js/state.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/render.js"></script>
  <script src="js/preset-select.js"></script>
  <script src="js/folders.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
